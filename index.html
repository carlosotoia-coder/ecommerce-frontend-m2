<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi E-commerce</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">Mi Tienda</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="cart.html">
                                Carrito 
                                <span class="badge bg-danger" id="cart-count">0</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="container my-5">

        <h1 class="text-center mb-4">Nuestros Productos</h1>

        <!-- SECCIÓN PRODUCTOS -->
        <section class="row">

            <!-- PRODUCTO 1 -->
            <article class="col-12 col-md-6 col-lg-4 mb-4">
                <div class="card h-100">
                    <img src="assets/img/producto1.jpg" class="card-img-top" alt="Producto 1">
                    <div class="card-body">
                        <h5 class="card-title">Producto 1</h5>
                        <p class="card-text">$10.000</p>
                        <a href="product.html" class="btn btn-primary">Ver más</a>
                        <button 
                                class="btn btn-success mt-2 add-to-cart"
                                data-id="1"
                                data-name="Producto 1"
                                data-price="10000">
                                Agregar al carrito
                        </button>
                    </div>
                </div>
            </article>

            <!-- PRODUCTO 2 -->
            <article class="col-12 col-md-6 col-lg-4 mb-4">
                <div class="card h-100">
                    <img src="assets/img/producto2.jpg" class="card-img-top" alt="Producto 2">
                    <div class="card-body">
                        <h5 class="card-title">Producto 2</h5>
                        <p class="card-text">$15.000</p>
                        <a href="product.html" class="btn btn-primary">Ver más</a>
                        <button 
                               class="btn btn-success mt-2 add-to-cart"
                               data-id="2"
                               data-name="Producto 2"
                               data-price="15000">
                               Agregar al carrito
                        </button>
                    </div>
                </div>
            </article>

            <!-- PRODUCTO 3 -->
            <article class="col-12 col-md-6 col-lg-4 mb-4">
                <div class="card h-100">
                    <img src="assets/img/producto3.jpg" class="card-img-top" alt="Producto 3">
                    <div class="card-body">
                        <h5 class="card-title">Producto 3</h5>
                        <p class="card-text">$17.000</p>
                        <a href="product.html" class="btn btn-primary">Ver más</a>
                        <button 
                               class="btn btn-success mt-2 add-to-cart"
                               data-id="3"
                               data-name="Producto 3"
                               data-price="17000">
                               Agregar al carrito
                        </button>
                    </div>
                </div>
            </article>

        </section>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">© 2026 Mi Tienda - Proyecto educativo</p>
    </footer>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS propio -->
    <script src="js/main.js"></script>

</body>
</html>
